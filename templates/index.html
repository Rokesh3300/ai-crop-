<!DOCTYPE html>
<html>
<head>
    <title>Smart Agri AI</title>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');}</script>
    <style>
        body { background: linear-gradient(135deg, #a8e063, #56ab2f); min-height: 100vh; text-align: center; font-family: Arial; }
        .form-box { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 300px; margin: auto; border: 1px solid rgba(255, 255, 255, 0.3); }
        input { margin: 5px; padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #2e7d32; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .mic-btn { background: #d32f2f; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="google_translate_element"></div>
    <h2>AI Precision Farming</h2>
    <div class="form-box">
        <form action="/predict" method="post">
            <input type="text" id="city" name="city" placeholder="City Name" required><br>
            <input type="number" name="N" placeholder="Nitrogen" required><br>
            <input type="number" name="P" placeholder="Phosphorus" required><br>
            <input type="number" name="K" placeholder="Potassium" required><br>
            <input type="number" step="0.1" name="ph" placeholder="pH Value" required><br>
            <button type="submit">Get Prediction</button><br>
            <button type="button" class="mic-btn" id="micBtn" onclick="startVoice()">🎤 Speak City</button>
            <p id="status"></p>
        </form>
    </div>
    <script>
        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.onstart = () => { document.getElementById('status').innerText = "Listening..."; };
            rec.onresult = (e) => { document.getElementById('city').value = e.results[0][0].transcript; document.getElementById('status').innerText = "Done!"; };
            rec.start();
        }
    </script>
</body>
</html>
